<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jauge de téléchargements : Klavyé Kréyòl Karukera</title>
<style>
/* Widget embarquable : à intégrer via
   <iframe src="https://famibelle.github.io/KreyolKeyb/jauge.html"
           style="width:100%;max-width:420px;height:150px;border:0;" loading="lazy"
           title="Téléchargements Klavyé Kréyòl"></iframe> */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --w-ink:#1C2624; --w-ink-soft:#4B5750; --w-card:#fff;
  --w-line:rgba(28,38,36,.15); --w-track:#DDEEEE;
  --w-sea:#0E6E76; --w-sun:#C97F1E; --w-hibiscus:#C94A3B;
}
@media (prefers-color-scheme: dark){
  :root{
    --w-ink:#EDEAE1; --w-ink-soft:#A7B3AC; --w-card:#182120;
    --w-line:rgba(237,234,225,.16); --w-track:#173436;
    --w-sea:#5FC7CE; --w-sun:#E3AE5E; --w-hibiscus:#F0897C;
  }
}
body{
  font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  background:transparent;padding:8px;
}
a.widget{
  display:block;text-decoration:none;color:var(--w-ink);
  background:var(--w-card);border:1px solid var(--w-line);border-radius:12px;
  padding:14px 16px;
}
.head{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.num{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
.num small{font-size:12px;font-weight:400;color:var(--w-ink-soft);}
.bar{height:12px;border-radius:999px;background:var(--w-track);overflow:hidden;}
.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--w-sea),var(--w-sun));min-width:6px;width:2%;transition:width .8s ease;}
.meta{display:flex;justify-content:space-between;gap:6px;font-size:11.5px;color:var(--w-ink-soft);margin-top:7px;flex-wrap:wrap;}
.meta b{color:var(--w-hibiscus);}
.meta img{height:1em;width:auto;vertical-align:-0.15em;border-radius:1px;}
</style>
</head>
<body>
<a class="widget" href="https://play.google.com/store/apps/details?id=com.potomitan.kreyolkeyboard&referrer=utm_source%3Dpotomitan_io%26utm_campaign%3Dlaunch10k" target="_blank" rel="noopener">
  <div class="head">
    <span class="num"><span id="g-current">…</span> <small>téléchargements · palier : <span id="g-next">…</span></small></span>
  </div>
  <div class="bar"><div class="fill" id="g-fill"></div></div>
  <div class="meta">
    <span id="g-remaining">Klavyé Kréyòl Karukera <img src="assets/drapeau-guadeloupe.png" alt="Drapeau de la Guadeloupe"></span>
    <span><b>Objectif : 10 000</b></span>
  </div>
</a>
<script>
fetch('stats/downloads.json').then(function(r){ return r.json(); }).then(function(s){
  var fmt = function(n){ return n.toLocaleString('fr-FR'); };
  var base = Math.floor(s.current / 100) * 100;
  var next = Math.min(base + 100, s.goal);
  if (next <= s.current) { next = Math.min(s.current + 100, s.goal); base = next - 100; }
  var pct = Math.max(2, Math.min(100, ((s.current - base) / (next - base)) * 100));
  document.getElementById('g-current').textContent = fmt(s.current);
  document.getElementById('g-next').textContent = fmt(next);
  document.getElementById('g-remaining').innerHTML = 'Ka rété ' + fmt(next - s.current) + ' pou pwochen palyé-la ! <img src="assets/drapeau-guadeloupe.png" alt="Drapeau de la Guadeloupe">';
  document.getElementById('g-fill').style.width = pct + '%';
}).catch(function(){});
</script>
</body>
</html>
