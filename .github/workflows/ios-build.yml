name: iOS Build & TestFlight

on:
  push:
    branches: [ios/port]
    paths: [ios/**]
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: "Envoyer sur TestFlight"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build & Sign
    runs-on: macos-14        # Apple Silicon — Xcode 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Xcode version ────────────────────────────────────────────────────
      - name: Sélectionner Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # ── 3. Installer xcodegen ───────────────────────────────────────────────
      - name: Installer xcodegen
        run: brew install xcodegen

      # ── 4. Générer le projet Xcode ──────────────────────────────────────────
      - name: Générer KreyolKeyb.xcodeproj
        working-directory: ios
        run: xcodegen generate

      # ── 5. Importer le certificat de distribution ───────────────────────────
      - name: Importer le certificat Apple
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD:   ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Créer un keychain temporaire
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="temppass123"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Importer le certificat
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Ajouter au search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      # ── 6. Installer les provisioning profiles ──────────────────────────────
      - name: Installer les Provisioning Profiles
        env:
          PP_APP_BASE64:       ${{ secrets.PP_APP_BASE64 }}
          PP_EXTENSION_BASE64: ${{ secrets.PP_EXTENSION_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          echo "$PP_APP_BASE64" | base64 --decode > "$PP_DIR/KreyolKeyb_App.mobileprovision"
          echo "$PP_EXTENSION_BASE64" | base64 --decode > "$PP_DIR/KreyolKeyb_Extension.mobileprovision"

      # ── 7. Build & Archive ──────────────────────────────────────────────────
      - name: Build & Archive
        working-directory: ios
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project KreyolKeyb.xcodeproj \
            -scheme KreyolKeyb \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/KreyolKeyb.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER_APP="KreyolKeyb AppStore" \
            PROVISIONING_PROFILE_SPECIFIER_EXT="KreyolKeyb Extension AppStore" \
            | xcpretty

      # ── 8. Exporter l'IPA ───────────────────────────────────────────────────
      - name: Exporter l'IPA
        working-directory: ios
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM_ID }}
        run: |
          # Injecter le Team ID dans ExportOptions.plist
          sed "s/\$(DEVELOPMENT_TEAM)/$DEVELOPMENT_TEAM/g" ExportOptions.plist > /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/KreyolKeyb.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            | xcpretty

      # ── 9. Sauvegarder l'IPA en artefact ────────────────────────────────────
      - name: Upload IPA (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: KreyolKeyb-${{ github.sha }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      # ── 10. Envoyer sur TestFlight (optionnel) ───────────────────────────────
      - name: Upload TestFlight
        if: github.event.inputs.upload_testflight == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/ios/port')
        env:
          APPLE_ID:            ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --username "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --verbose

      # ── 11. Nettoyage keychain ───────────────────────────────────────────────
      - name: Nettoyer le keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain" || true
